<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pawon Pami</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sidebar */
        .sidebar {
            background-color: #34495e;
            color: #fff;
            width: 250px;
            padding: 20px;
            position: fixed;
            height: 100vh;
        }

        .sidebar .logo img {
            width: 100%;
            max-width: 150px;
        }

        .sidebar h2 {
            text-align: center;
            margin: 15px 0;
        }

        .sidebar nav ul {
            list-style: none;
            padding: 0;
        }

        .sidebar nav ul li {
            margin: 15px 0;
        }

        .sidebar nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 10px;
            display: block;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .sidebar nav ul li a:hover,
        .sidebar nav ul li a.active {
            background-color: #f39c12;
        }

        /* Main content */
        .main-content {
            margin-left: 270px;
            padding: 20px;
            background-color: #f8f9fa;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 24px;
            color: #333;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .settings-group {
            margin-bottom: 30px;
        }

        .settings-group h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        .settings-group label {
            display: block;
            font-size: 16px;
            margin-bottom: 5px;
            color: #555;
        }

        .settings-group input[type="text"],
        .settings-group input[type="email"],
        .settings-group input[type="password"],
        .settings-group select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .settings-group button {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .settings-group button:hover {
            background-color: #2980b9;
        }

        /* Logout Button */
        .logout-section {
            text-align: center;
            margin-top: 40px;
        }

        .logout-section button {
            background-color: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .logout-section button:hover {
            background-color: #c0392b;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s;
        }

        .modal-content {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s;
        }

        .modal-content h3 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .modal-content .modal-buttons {
            display: flex;
            justify-content: space-between;
        }

        .modal-content button {
            width: 45%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-confirm {
            background-color: #e74c3c;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #c0392b;
        }

        .btn-cancel {
            background-color: #3498db;
            color: white;
        }

        .btn-cancel:hover {
            background-color: #2980b9;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                padding: 15px;
            }

            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <img src="../../asset/img/logo/mentah.png" alt="Logo Pawon Pami">
                <h2>Pawon Pami</h2>
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="pesanan.html">Pesanan</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="pengiriman.html">Pengiriman</a></li>
                    <li><a href="laporan.html">Laporan</a></li>
                    <li><a href="pengaturan.html" class="active">Pengaturan</a></li>
                </ul>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="container">
                <!-- Settings Header -->
                <h2 class="section-title">Pengaturan</h2>

                <!-- Account Settings -->
                <div class="settings-group">
                    <h3>Pengaturan Akun</h3>
                    <label for="username">Nama Pengguna:</label>
                    <input type="text" id="username" placeholder="Nama Pengguna" value="John Doe">

                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Email" value="johndoe@email.com">

                    <label for="password">Kata Sandi Baru:</label>
                    <input type="password" id="password" placeholder="Masukkan kata sandi baru">
                    <button>Simpan Perubahan</button>
                </div>

                <!-- Notification Settings -->
                <div class="settings-group">
                    <h3>Pengaturan Notifikasi</h3>
                    <label for="notif">Jenis Notifikasi:</label>
                    <select id="notif">
                        <option>Email</option>
                        <option>SMS</option>
                        <option>Push Notification</option>
                    </select>
                    <button>Simpan Perubahan</button>
                </div>

                <!-- Privacy Settings -->
                <div class="settings-group">
                    <h3>Pengaturan Privasi</h3>
                    <label for="visibility">Visibilitas Akun:</label>
                    <select id="visibility">
                        <option>Publik</option>
                        <option>Privat</option>
                    </select>
                    <button>Simpan Pengaturan Privasi</button>
                </div>

                <!-- Logout Section -->
                <div class="logout-section">
                    <button id="logoutBtn">Logout</button>
                </div>

                <!-- Privacy Policy Link -->
                <div class="privacy-policy">
                    <a href="privacy-policy.html">Kebijakan Privasi</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmation -->
    <div id="logoutModal" class="modal">
        <div class="modal-content">
            <h3>Konfirmasi Logout</h3>
            <p>Apakah Anda yakin ingin logout?</p>
            <div class="modal-buttons">
                <button class="btn-confirm" id="confirmLogout">Ya, Logout</button>
                <button class="btn-cancel" id="cancelLogout">Batal</button>
            </div>
        </div>
    </div>

    <script>
        // Get elements
        const logoutBtn = document.getElementById('logoutBtn');
        const logoutModal = document.getElementById('logoutModal');
        const confirmLogout = document.getElementById('confirmLogout');
        const cancelLogout = document.getElementById('cancelLogout');

        // Show the modal when logout button is clicked
        logoutBtn.onclick = function () {
            logoutModal.style.display = 'flex';
        }

        // Hide the modal and redirect to the homepage when confirmed
        confirmLogout.onclick = function () {
            logoutModal.style.display = 'none';
            window.location.href = "../index.html";  // Redirect to the homepage or login page
        }

        // Hide the modal when cancel button is clicked
        cancelLogout.onclick = function () {
            logoutModal.style.display = 'none';
        }

        // Hide the modal when clicking outside of it
        window.onclick = function (event) {
            if (event.target == logoutModal) {
                logoutModal.style.display = 'none';
            }
        }
    </script>
</body>

</html>
