<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pawon Pami</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Reset some default styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            background-image: linear-gradient(135deg, #f8f9fa, #d9e7f4);
            background-size: 200% 200%;
            animation: gradientAnimation 5s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animation for background gradient */
        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Container for the login form */
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 400px;
            animation: slideIn 0.5s ease;
        }

        /* Logo Styling */
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 250px;
            animation: bounce 1s infinite alternate;
        }

        /* Title Styling */
        h2 {
            text-align: center;
            color: #34495e;
            margin-bottom: 30px;
        }

        /* Input field styling */
        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Button styling */
        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Animation for sliding in */
        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Animation for logo bouncing */
        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 500px) {
            .login-container {
                width: 90%;
                padding: 30px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <img src="../../asset/img/logo/mentah.png" alt="Logo Pawon Pami">
        </div>
        <h2>Login ke Pawon Pami</h2>
        <div class="input-group">
            <input type="text" placeholder="Nama Pengguna" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="Kata Sandi" required>
        </div>
        <button id="loginButton" type="submit">Masuk</button>
    </div>

    <script>
        // Redirect to another page when the login button is clicked
        document.getElementById('loginButton').addEventListener('click', function () {
            window.location.href = 'dashboard.html'; // Ganti dengan halaman tujuan Anda
        });
    </script>
</body>

</html>
